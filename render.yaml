services:
  - type: web
    name: caresync-hub-backend
    runtime: node
    repo: https://github.com/Satyasai85/CareSync-Hub_Backend
    branch: main
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_FILE
        value: /var/data/caresync.sqlite
      - key: FRONTEND_URL
        value: http://localhost:5173
    disk:
      name: caresync-hub-data
      mountPath: /var/data
      sizeGB: 1
